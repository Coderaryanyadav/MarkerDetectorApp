/**
 * app/build.gradle — Module-level Gradle configuration
 *
 * Key decisions:
 * - minSdk 24: Vision Camera v4 requires API 24+
 * - NDK 26: Stable for OpenCV 4.x CMake builds
 * - hermes: enabled for 30% faster startup vs JSC
 * - abiFilters: arm64-v8a covers >90% of modern Android devices
 *               armeabi-v7a adds support for older 32-bit devices
 *               x86_64 enables emulator testing
 */
apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "kotlin-android"

/**
 * React Native Gradle Plugin configuration
 * Controls JS bundling and native code generation.
 */
react {
    /* JS entry point */
    entryFile = file("../../index.js")

    /* Hermes engine — significantly faster than JSC */
    enableHermes = true

    /* Bundle command for release builds */
    bundleCommand = "bundle"

    /* OpenCV JNI libs path — copied here from OpenCV SDK */
    // jniLibsDir = file("src/main/jniLibs")
}

android {
    namespace  "com.markerdetectorapp"
    compileSdk rootProject.ext.compileSdkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    ndkVersion rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "com.markerdetectorapp"
        minSdk     rootProject.ext.minSdkVersion
        targetSdk  rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // Multidex required for apps with >64k method limit
        multiDexEnabled true

        // ABI filters — controls which native libs are included in APK
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }

        // Test runner
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // CMake for OpenCV JNI bridge
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -frtti -fexceptions"
                arguments "-DANDROID_STL=c++_shared",
                          "-DANDROID_ARM_NEON=TRUE"  // NEON SIMD for faster OpenCV ops
            }
        }
    }

    // CMakeLists.txt location for OpenCV JNI bridge
    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
            version "3.22.1"
        }
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
        release {
            // Load from environment or properties file — never hardcode secrets
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile     file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias      MYAPP_UPLOAD_KEY_ALIAS
                keyPassword   MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            // Enable JS debugging via Chrome DevTools
            buildConfigField "boolean", "IS_DEV_BUILD", "true"
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled   true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            buildConfigField "boolean", "IS_DEV_BUILD", "false"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packagingOptions {
        // Avoid duplicate native library errors
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        // Exclude unnecessary files to reduce APK size
        excludes += [
            'META-INF/DEPENDENCIES',
            'META-INF/LICENSE',
            'META-INF/LICENSE.txt',
        ]
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Kotlin
    implementation("org.jetbrains.kotlin:kotlin-stdlib:${rootProject.ext.kotlinVersion}")

    // Multidex
    implementation "androidx.multidex:multidex:2.0.1"

    // AndroidX core
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"

    // CameraX — used internally by Vision Camera
    def camerax_version = "1.3.3"
    implementation "androidx.camera:camera-core:${camerax_version}"
    implementation "androidx.camera:camera-camera2:${camerax_version}"
    implementation "androidx.camera:camera-lifecycle:${camerax_version}"
    implementation "androidx.camera:camera-video:${camerax_version}"
    implementation "androidx.camera:camera-view:${camerax_version}"
    implementation "androidx.camera:camera-extensions:${camerax_version}"

    // OpenCV — import from local maven or AAR
    // Option A (recommended): Import from local AAR
    // implementation fileTree(dir: 'libs', include: ['*.aar'])
    // Option B: JitPack build (slower, not recommended for production)
    // implementation 'com.github.quickbirdstudios:opencv-android:4.5.3.0'

    // Testing
    testImplementation "junit:junit:4.13.2"
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    androidTestImplementation "androidx.test.espresso:espresso-core:3.5.1"
}
