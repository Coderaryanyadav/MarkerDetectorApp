// Top-level build file — settings shared by all sub-projects/modules
buildscript {
    ext {
        // Core version pins — changing these affects all modules
        buildToolsVersion = "34.0.0"
        minSdkVersion    = 24    // Android 7.0 — minimum for Vision Camera v4
        compileSdkVersion = 34   // Android 14
        targetSdkVersion  = 34
        ndkVersion       = "26.1.10909125"  // Required for OpenCV & C++ native code
        kotlinVersion    = "1.9.23"

        // React Native Reanimated requires this exact JSC version
        jscVersion       = "2026.01.07-v2"
    }

    repositories {
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.3.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${rootProject.ext.kotlinVersion}")
    }
}

apply plugin: "com.facebook.react.rootproject"
