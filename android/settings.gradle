pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        // JitPack for community libraries
        maven { url "https://www.jitpack.io" }
        // Local Maven — used if you publish OpenCV AAR locally
        mavenLocal()
    }
}

rootProject.name = 'MarkerDetectorApp'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
